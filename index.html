<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Palavra Diária — Plano de Leitura Bíblica</title>
<meta name="description" content="Leia a Bíblia inteira em 3 ou 5 anos, uma leitura por dia, com o texto dentro do app e sem anúncios." />
<meta name="theme-color" content="#0c1a1d" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Palavra Diária" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
html,body{margin:0;background:#09151a;}
#root{
  --bg:#0c1a1d; --bg2:#0f2327; --surface:#14313a; --surface2:#173a44;
  --line:rgba(201,162,75,.16); --line2:rgba(236,227,208,.08);
  --ink:#ece3d0; --muted:#93a7a4; --muted2:#6f8582;
  --gold:#c9a24b; --gold2:#e6c878; --sage:#86b09a;
  min-height:100vh; width:100%;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(201,162,75,.14), rgba(201,162,75,0) 55%),
    linear-gradient(180deg,#0c1a1d 0%, #0a161a 100%);
  color:var(--ink);
  font-family:'Instrument Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
#root *{box-sizing:border-box;}
.pb-wrap{max-width:600px;margin:0 auto;padding:calc(22px + env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));}
svg{display:block;}
button{font-family:inherit;}

.pb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pb-brand{display:flex;align-items:center;gap:8px;color:var(--gold2);
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;letter-spacing:.3px;}
.pb-brand svg{color:var(--gold);}
.pb-icbtn{background:transparent;border:1px solid var(--line);color:var(--muted);
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;cursor:pointer;transition:.2s;}
.pb-icbtn:hover{color:var(--gold2);border-color:var(--gold);}

.pb-status{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pb-badge{font-size:12.5px;padding:6px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);color:var(--muted);border:1px solid var(--line2);}
.pb-badge.ok{color:var(--sage);border-color:rgba(134,176,154,.3);}
.pb-badge.warn{color:var(--gold2);border-color:var(--line);cursor:pointer;}
.pb-badge.flame{color:#e0a86a;border-color:rgba(224,168,106,.28);}
.pb-badge.install{color:var(--gold2);border-color:var(--line);cursor:pointer;}

.pb-hero{position:relative;background:linear-gradient(180deg,var(--surface2),var(--surface));
  border:1px solid var(--line);border-radius:20px;padding:22px 20px 18px;margin-bottom:16px;overflow:hidden;animation:rise .5s ease both;}
.pb-hero::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7;}
.pb-hero.read::before{background:linear-gradient(90deg,transparent,var(--sage),transparent);}
.pb-hero-eb{font-size:12.5px;color:var(--muted);margin:0 0 12px;letter-spacing:.2px;}
.pb-hero-eb .cap{text-transform:capitalize;}
.pb-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.6px;
  text-transform:uppercase;padding:4px 9px;border-radius:7px;margin-bottom:12px;}
.pb-tag.at{background:rgba(201,162,75,.14);color:var(--gold2);}
.pb-tag.nt{background:rgba(134,176,154,.16);color:var(--sage);}
.pb-tag.reflect{background:rgba(224,168,106,.14);color:#e6b985;}
.pb-refs{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;align-items:flex-start;}
.pb-ref{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;line-height:1.05;color:var(--ink);
  background:none;border:none;padding:0;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:.2s;text-align:left;}
.pb-ref svg{color:var(--gold);width:17px;height:17px;opacity:.75;}
.pb-ref:hover{color:var(--gold2);}
.pb-hero-ref{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:34px;line-height:1.12;color:var(--ink);margin-bottom:14px;}
.pb-hero-ref.small{font-size:25px;font-weight:500;font-style:italic;color:#ded3bd;}
.pb-hero-note{font-size:13.5px;color:var(--muted);line-height:1.5;margin:0 0 14px;}
.pb-linkbtn{background:none;border:none;padding:0;color:var(--gold2);cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--line);}
.pb-hero-actions{display:flex;gap:10px;flex-wrap:wrap;}
.pb-open{flex:1;min-width:150px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));color:#20180a;font-weight:600;font-size:14.5px;
  border:none;padding:13px 16px;border-radius:13px;transition:.2s;cursor:pointer;}
.pb-open:hover{filter:brightness(1.06);}
.pb-check{flex:1;min-width:150px;display:inline-flex;align-items:center;justify-content:center;gap:7px;
  background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:14.5px;
  padding:13px 16px;border-radius:13px;cursor:pointer;transition:.2s;}
.pb-check:hover{border-color:var(--gold);color:var(--gold2);}
.pb-check.on{background:rgba(134,176,154,.16);border-color:rgba(134,176,154,.45);color:var(--sage);}
.pb-hero-done{text-align:center;color:var(--gold2);}
.pb-hero-done svg{color:var(--gold);margin:0 auto 8px;}

.pb-notebox{margin-top:16px;padding-top:14px;border-top:1px solid var(--line2);}
.pb-note-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);margin-bottom:7px;}
.pb-note{width:100%;background:rgba(0,0,0,.16);border:1px solid var(--line2);border-radius:11px;color:var(--ink);
  font-family:inherit;font-size:14px;padding:10px 12px;resize:vertical;line-height:1.5;}
.pb-note::placeholder{color:var(--muted2);}
.pb-note:focus{outline:none;border-color:var(--line);}

.pb-card{background:var(--surface);border:1px solid var(--line2);border-radius:18px;padding:16px 18px;margin-bottom:14px;}
.pb-collapse{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;
  color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;padding:0;}
.pb-collapse span{display:flex;align-items:center;gap:9px;}
.pb-collapse span svg{color:var(--gold);}
.pb-collapse .chev{transition:transform .25s;color:var(--muted);}
.pb-collapse .chev.rot{transform:rotate(180deg);}

.pb-prog-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.pb-prog-pct{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:44px;line-height:1;color:var(--gold2);}
.pb-prog-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.pb-prog-right{font-size:12.5px;color:var(--muted);text-align:right;}
.pb-prog-right span{color:var(--ink);font-weight:600;font-size:15px;}
.pb-bar{height:9px;background:rgba(0,0,0,.28);border-radius:999px;overflow:hidden;margin-bottom:16px;}
.pb-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--gold2));
  transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(201,162,75,.5);}
.pb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.pb-stat{background:rgba(0,0,0,.14);border-radius:12px;padding:11px 10px;text-align:center;}
.pb-stat-v{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:var(--ink);line-height:1.1;}
.pb-stat-v.sm{font-size:14px;font-family:'Instrument Sans',sans-serif;font-weight:600;line-height:1.25;}
.pb-stat-l{font-size:10.5px;color:var(--muted2);margin-top:4px;line-height:1.3;}

.pb-journey{margin-top:16px;}
.pb-strand-group{margin-bottom:14px;}
.pb-strand-title{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin:0 0 8px;}
.pb-strand{display:flex;flex-wrap:wrap;gap:5px;}
.pb-node{width:15px;height:15px;border-radius:5px;border:none;cursor:pointer;padding:0;transition:.2s;background:rgba(236,227,208,.09);}
.pb-node.part{background:linear-gradient(135deg,var(--gold) 50%,rgba(236,227,208,.12) 50%);}
.pb-node.full{background:var(--gold);box-shadow:0 0 7px rgba(201,162,75,.55);}
.pb-node.sel{outline:2px solid var(--gold2);outline-offset:2px;}
.pb-node:hover{transform:scale(1.18);}
.pb-node-label{margin-top:12px;font-size:13px;color:var(--muted);min-height:18px;}
.pb-node-label strong{color:var(--gold2);font-weight:600;}

.pb-catch{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
.pb-catch-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.14);border:1px solid var(--line2);
  border-radius:12px;padding:9px 11px;transition:.15s;}
.pb-catch-row:hover{border-color:var(--line);}
.pb-catch-row.done{background:rgba(134,176,154,.08);}
.pb-cbox{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--muted2);display:grid;place-items:center;
  color:#20180a;flex-shrink:0;transition:.15s;background:transparent;cursor:pointer;}
.pb-cbox.on{background:var(--sage);border-color:var(--sage);}
.pb-catch-main{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
.pb-catch-ref{font-size:14.5px;color:var(--ink);font-weight:500;}
.pb-catch-date{font-size:11.5px;color:var(--muted2);text-transform:capitalize;}
.pb-catch-read{background:transparent;border:1px solid var(--line2);color:var(--gold2);border-radius:9px;
  width:34px;height:34px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;}
.pb-empty{color:var(--muted);font-size:13.5px;margin-top:12px;}

.pb-set-line{font-size:13.5px;color:var(--muted);margin:0 0 12px;}
.pb-set-line strong{color:var(--ink);}
.pb-setbtn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);
  color:var(--gold2);font-size:13.5px;padding:10px 14px;border-radius:11px;cursor:pointer;margin:0 8px 8px 0;}
.pb-ios{font-size:12.5px;color:var(--muted);line-height:1.55;margin:8px 0 0;padding:11px 13px;background:rgba(0,0,0,.14);border-radius:11px;}
.pb-ios strong{color:var(--ink);}
.pb-confirm p{font-size:13.5px;color:var(--ink);margin:0 0 10px;}
.pb-confirm-row{display:flex;gap:10px;}
.pb-btn-ghost{flex:1;background:transparent;border:1px solid var(--line2);color:var(--muted);padding:10px;border-radius:11px;font-size:13.5px;cursor:pointer;}
.pb-btn-danger{flex:1;background:rgba(190,90,70,.16);border:1px solid rgba(190,90,70,.4);color:#e2917f;padding:10px;border-radius:11px;font-size:13.5px;cursor:pointer;}

.pb-foot{text-align:center;font-size:11px;color:var(--muted2);margin-top:20px;line-height:1.55;}
.pb-foot strong{color:var(--muted);}

.pb-setup{padding-top:34px;}
.pb-glyph{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;background:rgba(201,162,75,.12);border:1px solid var(--line);color:var(--gold);margin-bottom:20px;}
.pb-eyebrow{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 8px;}
.pb-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;line-height:1.08;margin:0 0 14px;color:var(--ink);}
.pb-lead{font-size:14.5px;color:var(--muted);line-height:1.6;margin:0 0 26px;}
.pb-lead strong{color:var(--ink);}
.pb-flabel{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin:0 0 10px;}
.pb-years{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.pb-year{background:var(--surface);border:1px solid var(--line2);border-radius:15px;padding:15px;cursor:pointer;
  text-align:left;transition:.2s;display:flex;flex-direction:column;gap:1px;}
.pb-year:hover{border-color:var(--line);}
.pb-year.on{border-color:var(--gold);background:linear-gradient(180deg,var(--surface2),var(--surface));box-shadow:0 0 0 1px var(--gold) inset;}
.pb-year-n{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:32px;color:var(--gold2);line-height:1;}
.pb-year-l{font-size:13px;color:var(--muted);margin-top:-2px;}
.pb-year-h{font-size:11.5px;color:var(--muted2);margin-top:7px;line-height:1.3;}
.pb-date{width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--ink);
  font-family:inherit;font-size:15px;padding:13px 15px;margin-bottom:26px;color-scheme:dark;}
.pb-date:focus{outline:none;border-color:var(--gold);}
.pb-cta{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#20180a;font-weight:600;font-size:16px;padding:15px;border-radius:14px;border:none;cursor:pointer;transition:.2s;}
.pb-cta:hover{filter:brightness(1.06);}
.pb-fine{font-size:11.5px;color:var(--muted2);text-align:center;margin:14px 0 0;line-height:1.5;}

/* ---------- Leitor ---------- */
.rd{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  background:radial-gradient(120% 60% at 50% 0%, rgba(201,162,75,.10), rgba(201,162,75,0) 50%), linear-gradient(180deg,#0d1c20,#0a151a);
  animation:fade .25s ease;}
.rd-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:calc(14px + env(safe-area-inset-top)) 18px 12px;background:rgba(11,24,27,.82);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);}
.rd-htxt{flex:1;min-width:0;}
.rd-sub{font-size:10.5px;color:var(--gold);letter-spacing:.7px;text-transform:uppercase;margin-bottom:1px;}
.rd-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:var(--ink);line-height:1.05;}
.rd-speak{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--gold);color:var(--gold2);
  background:rgba(201,162,75,.10);border-radius:11px;padding:9px 12px;cursor:pointer;font-size:13px;font-weight:600;}
.rd-speak:hover{filter:brightness(1.08);}
.rd-speak.on{background:rgba(134,176,154,.16);border-color:rgba(134,176,154,.45);color:var(--sage);}
.rd-speak .lbl{white-space:nowrap;}
.rd-close{width:38px;height:38px;flex-shrink:0;border-radius:11px;border:1px solid var(--line);background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer;}
.rd-close:hover{color:var(--gold2);border-color:var(--gold);}
.rd-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.rd-inner{max-width:620px;margin:0 auto;padding:22px 22px 34px;}
.rd-v{font-family:'Cormorant Garamond',serif;font-size:21px;line-height:1.72;color:#e9e0cd;margin:0 0 3px;
  padding:3px 9px;margin-left:-9px;margin-right:-9px;border-radius:9px;transition:background .18s ease,color .18s ease;}
.rd-v.speaking{background:rgba(201,162,75,.17);color:#fff8ec;}
.rd-n{font-family:'Instrument Sans',sans-serif;font-size:11px;font-weight:600;color:var(--gold);vertical-align:super;margin-right:6px;}
.rd-credit{font-size:10.5px;color:var(--muted2);text-align:center;margin-top:26px;line-height:1.5;padding-top:14px;border-top:1px solid var(--line2);}
.rd-loading{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--gold);padding:70px 20px;text-align:center;line-height:1.5;}
.rd-spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(201,162,75,.25);border-top-color:var(--gold);animation:spin .8s linear infinite;}
.rd-foot{position:sticky;bottom:0;display:flex;align-items:center;gap:10px;
  padding:11px 16px calc(11px + env(safe-area-inset-bottom));background:rgba(11,24,27,.86);backdrop-filter:blur(10px);border-top:1px solid var(--line);}
.rd-nav{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;}
.rd-nav:hover{border-color:var(--gold);color:var(--gold2);}
.rd-nav:disabled{opacity:.35;cursor:default;}
.rd-mark{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:11px;padding:11px;cursor:pointer;font-weight:600;font-size:14px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));color:#20180a;border:none;}
.rd-mark.on{background:rgba(134,176,154,.16);border:1px solid rgba(134,176,154,.45);color:var(--sage);}
.rd-spacer{flex:1;}

@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--gold2);outline-offset:2px;}
@media (max-width:400px){ .pb-ref{font-size:34px;} .pb-stats{grid-template-columns:1fr 1fr;} .rd-v{font-size:20px;} .rd-speak .lbl{display:none;} .rd-speak{padding:9px 10px;} }
@media (prefers-reduced-motion:reduce){ .pb-hero,.rd{animation:none;} .pb-bar-fill{transition:none;} .rd-spin{animation-duration:1.6s;} }
</style>
</head>
<body>
<div id="root" class="pb-app"></div>

<script>
"use strict";

/* ---------------- Livros da Bíblia (66) ---------------- */
const RAW_BOOKS = [
  ["Gênesis","gn",50,"AT"],["Êxodo","ex",40,"AT"],["Levítico","lv",27,"AT"],["Números","nm",36,"AT"],
  ["Deuteronômio","dt",34,"AT"],["Josué","js",24,"AT"],["Juízes","jz",21,"AT"],["Rute","rt",4,"AT"],
  ["1 Samuel","1sm",31,"AT"],["2 Samuel","2sm",24,"AT"],["1 Reis","1rs",22,"AT"],["2 Reis","2rs",25,"AT"],
  ["1 Crônicas","1cr",29,"AT"],["2 Crônicas","2cr",36,"AT"],["Esdras","ed",10,"AT"],["Neemias","ne",13,"AT"],
  ["Ester","et",10,"AT"],["Jó","jó",42,"AT"],["Salmos","sl",150,"AT"],["Provérbios","pv",31,"AT"],
  ["Eclesiastes","ec",12,"AT"],["Cânticos","ct",8,"AT"],["Isaías","is",66,"AT"],["Jeremias","jr",52,"AT"],
  ["Lamentações","lm",5,"AT"],["Ezequiel","ez",48,"AT"],["Daniel","dn",12,"AT"],["Oséias","os",14,"AT"],
  ["Joel","jl",3,"AT"],["Amós","am",9,"AT"],["Obadias","ob",1,"AT"],["Jonas","jn",4,"AT"],
  ["Miquéias","mq",7,"AT"],["Naum","na",3,"AT"],["Habacuque","hc",3,"AT"],["Sofonias","sf",3,"AT"],
  ["Ageu","ag",2,"AT"],["Zacarias","zc",14,"AT"],["Malaquias","ml",4,"AT"],
  ["Mateus","mt",28,"NT"],["Marcos","mc",16,"NT"],["Lucas","lc",24,"NT"],["João","jo",21,"NT"],
  ["Atos","atos",28,"NT"],["Romanos","rm",16,"NT"],["1 Coríntios","1co",16,"NT"],["2 Coríntios","2co",13,"NT"],
  ["Gálatas","gl",6,"NT"],["Efésios","ef",6,"NT"],["Filipenses","fp",4,"NT"],["Colossenses","cl",4,"NT"],
  ["1 Tessalonicenses","1ts",5,"NT"],["2 Tessalonicenses","2ts",3,"NT"],["1 Timóteo","1tm",6,"NT"],
  ["2 Timóteo","2tm",4,"NT"],["Tito","tt",3,"NT"],["Filemom","fm",1,"NT"],["Hebreus","hb",13,"NT"],
  ["Tiago","tg",5,"NT"],["1 Pedro","1pe",5,"NT"],["2 Pedro","2pe",3,"NT"],["1 João","1jo",5,"NT"],
  ["2 João","2jo",1,"NT"],["3 João","3jo",1,"NT"],["Judas","jd",1,"NT"],["Apocalipse","ap",22,"NT"],
];
let _off = 0;
const BOOKS = RAW_BOOKS.map(([name,abbr,chapters,testament]) => {
  const b = {name,abbr,chapters,testament,offset:_off}; _off += chapters; return b;
});
const TOTAL_CHAPTERS = _off; // 1189
const CHAPTER_META = [];
BOOKS.forEach((b,bi) => { for (let c=1;c<=b.chapters;c++) CHAPTER_META.push({book:b.name,testament:b.testament,chapter:c,bi:bi,ci:c-1,g:CHAPTER_META.length}); });

/* ---------------- Utilidades ---------------- */
const DAY = 86400000;
const YEAR_OPTIONS = [2,3,4,5];
function buildPlan(years){
  const totalDays = Math.round(years*365.25);
  const cum = new Array(totalDays);
  for (let i=0;i<totalDays;i++) cum[i] = Math.round(((i+1)*TOTAL_CHAPTERS)/totalDays);
  return {totalDays,cum};
}
const dayStart = (i,cum) => (i>0 ? cum[i-1] : 0);
const parseDate = (s) => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };

const toISO = (d) => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const dateForIndex = (startISO,idx) => new Date(parseDate(startISO).getTime()+idx*DAY);
const fmtLong = (d) => d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
const fmtShort = (d) => d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
const fmtFull = (d) => d.toLocaleDateString("pt-BR",{day:"numeric",month:"long",year:"numeric"});
const esc = (s) => String(s).replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function ensureBible(){

/* ---------------- Cálculos ---------------- */
function derive(){
  const cfg = state.config;
  const plan = cfg ? buildPlan(cfg.years) : null;
  const todayIndex = cfg ? Math.floor((todayMidnight()-parseDate(cfg.startISO))/DAY) : 0;
  const completedSet = new Set(state.completed);
  const readSet = new Set();
  if (plan) state.completed.forEach((i)=>{ if(i>=0&&i<plan.totalDays){ for(let c=dayStart(i,plan.cum);c<plan.cum[i];c++) readSet.add(c); } });
  const chaptersRead = readSet.size;
  const pct = Math.round((chaptersRead/TOTAL_CHAPTERS)*1000)/10;
  const bookProgress = BOOKS.map((b)=>{ let d=0; for(let c=0;c<b.chapters;c++) if(readSet.has(b.offset+c)) d++; return d/b.chapters; });
  let streak = 0;
  if (cfg && todayIndex>=0){ let i = completedSet.has(todayIndex)?todayIndex:todayIndex-1; while(i>=0&&completedSet.has(i)){streak++;i--;} }
  let pending = 0;
  if (cfg && todayIndex>=0){ const upto=Math.min(todayIndex,plan.totalDays-1); for(let i=0;i<=upto;i++) if(!completedSet.has(i)) pending++; }
  return {plan,todayIndex,completedSet,readSet,chaptersRead,pct,bookProgress,streak,pending};
}
function refsForDay(i,plan){
  const arr=[]; if(!plan||i<0||i>=plan.totalDays) return arr;
  for(let c=dayStart(i,plan.cum);c<plan.cum[i];c++) arr.push(CHAPTER_META[c]); return arr;
}

function afterRender(d){

/* ---------------- Leitor ---------------- */
function viewReader(d){
  const r = state.reader;
  if (!r.open) return "";
  const meta = CHAPTER_META[r.g];
  const canMark = r.dayIndex!=null;
  const done = canMark && d && d.completedSet.has(r.dayIndex);

  let bodyInner;
  if (r.error){
    bodyInner = '<div class="rd-loading">'+ic("book",30)+'<div>Não consegui carregar o texto agora.<br>Verifique a conexão e tente abrir de novo.</div></div>';
  } else if (r.loading || !BIBLE){
    bodyInner = '<div class="rd-loading"><div class="rd-spin"></div><div>Carregando a Bíblia…<br><span style="font-size:11px;color:var(--muted2)">só na primeira vez; depois fica offline</span></div></div>';
  } else {
    const verses = BIBLE[meta.bi][meta.ci];
    const vs = verses.map((t,k)=>'<p class="rd-v" id="rdv-'+k+'"><span class="rd-n">'+(k+1)+'</span>'+esc(t)+'</p>').join("");
    bodyInner = '<div class="rd-inner">'+vs+
      '<p class="rd-credit">Bíblia Livre (BLIVRE) · Diego Santos, Mario Sérgio e Marco Teles<br>Creative Commons Atribuição 3.0</p></div>';
  }

  const canPrev = r.g>0, canNext = r.g<TOTAL_CHAPTERS-1;
  const markBtn = canMark
    ? '<button class="rd-mark'+(done?" on":"")+'" data-act="readerMark">'+ic("check",16)+' '+(done?"Lido":"Marcar como lido")+'</button>'
    : '<div class="rd-spacer"></div>';

  let speakBtn = "";
  if (TTS && !r.error && !r.loading && BIBLE){
    const sp = state.speak;
    const lbl = sp.active ? "Pausar" : (sp.paused ? "Continuar" : "Ouvir");
    const icn = sp.active ? "pause" : "play";
    speakBtn = '<button class="rd-speak'+(sp.active?" on":"")+'" data-act="readerSpeak" aria-label="'+lbl+'">'+ic(icn,17)+'<span class="lbl">'+lbl+'</span></button>';
  }

  return '<div class="rd" role="dialog" aria-modal="true">'+
    '<div class="rd-head"><div class="rd-htxt">'+
      '<div class="rd-sub">'+(meta.testament==="AT"?"Antigo Testamento":"Novo Testamento")+'</div>'+
      '<div class="rd-title">'+esc(meta.book)+' '+meta.chapter+'</div></div>'+
      speakBtn +
      '<button class="rd-close" data-act="readerClose" aria-label="Fechar">'+ic("x",18)+'</button></div>'+
    '<div class="rd-body" id="rd-body">'+bodyInner+'</div>'+
    '<div class="rd-foot">'+
      '<button class="rd-nav" data-act="readerPrev"'+(canPrev?"":" disabled")+' aria-label="Capítulo anterior">'+ic("left",16)+'</button>'+
      markBtn +
      '<button class="rd-nav" data-act="readerNext"'+(canNext?"":" disabled")+' aria-label="Próximo capítulo">'+ic("right",16)+'</button>'+
    '</div></div>';
}

/* ---------------- Ações ---------------- */
let noteTimer = null;

root.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const act = el.dataset.act;
  const i = el.dataset.i!=null && el.dataset.i!=="" ? parseInt(el.dataset.i,10) : null;
  const g = el.dataset.g!=null && el.dataset.g!=="" ? parseInt(el.dataset.g,10) : null;
  const day = el.dataset.day!=null && el.dataset.day!=="" ? parseInt(el.dataset.day,10) : null;
  const d = state.config ? derive() : null;

  switch(act){
    case "setYears": state.ui.setupYears = parseInt(el.dataset.y,10); render(); break;
    case "start": {
      const di = document.getElementById("pb-setup-date");
      const startISO = di && di.value ? di.value : state.ui.setupStart;
      state.config = { years: state.ui.setupYears, startISO };
      store.set(K_CONFIG, JSON.stringify(state.config)); render(); break;
    }
    case "toggleToday": toggleDay(d.todayIndex); break;
    case "toggleDay": toggleDay(i); break;
    case "read": openReader(g, day); break;
    case "readerPrev": if(state.reader.g>0){ stopSpeak(); state.reader.g--; } render(); break;
    case "readerNext": if(state.reader.g<TOTAL_CHAPTERS-1){ stopSpeak(); state.reader.g++; } render(); break;
    case "readerClose": stopSpeak(); state.reader.open=false; render(); break;
    case "readerMark": if(state.reader.dayIndex!=null) toggleDay(state.reader.dayIndex); break;
    case "readerSpeak": toggleSpeak(); break;
    case "toggleSettings": state.ui.settings=!state.ui.settings; state.ui.confirmReset=false; render(); break;
    case "toggleJourney": state.ui.journey=!state.ui.journey; render(); break;
    case "toggleCatchup": state.ui.catchup=!state.ui.catchup; render(); break;
    case "openCatchup": state.ui.catchup=true; render(); break;
    case "selectBook": state.ui.selectedBook = (state.ui.selectedBook===i?null:i); render(); break;
    case "confirmReset": state.ui.confirmReset=true; render(); break;
    case "cancelReset": state.ui.confirmReset=false; render(); break;
    case "reset": doReset(); break;
    case "iosHelp": state.ui.showIosHelp=!state.ui.showIosHelp; render(); break;
    case "install": doInstall(); break;
  }
});

root.addEventListener("input", (e)=>{
  if (e.target.id==="pb-note"){
    const d = derive();
    state.notes[d.todayIndex] = e.target.value;
    clearTimeout(noteTimer); noteTimer = setTimeout(saveProgress, 500);
  }
});
root.addEventListener("change", (e)=>{ if (e.target.id==="pb-setup-date") state.ui.setupStart = e.target.value; });

function toggleDay(i){
  if (i==null || i<0) return;
  const idx = state.completed.indexOf(i);
  if (idx>=0) state.completed.splice(idx,1); else state.completed.push(i);
  saveProgress(); render();
}
function doReset(){
  stopSpeak();
  state.config=null; state.completed=[]; state.notes={};
  state.reader.open=false;
  state.ui.settings=false; state.ui.confirmReset=false; state.ui.setupYears=3; state.ui.setupStart=toISO(todayMidnight());
  store.set(K_CONFIG,""); saveProgress(); render();
}
async function doInstall(){
  if (deferredPrompt){ deferredPrompt.prompt(); try { await deferredPrompt.userChoice; } catch(e){} deferredPrompt=null; render(); }
  else if (isIOS){ state.ui.settings=true; state.ui.showIosHelp=true; render(); }
}
async function openReader(g, dayIndex){
  if (g==null) return;
  stopSpeak();
  state.reader = { open:true, g:g, dayIndex:(dayIndex==null?null:dayIndex), loading:!BIBLE, error:false };
  lastReaderG = null;
  render();
  if (!BIBLE){
    try { await ensureBible(); state.reader.loading=false; }
    catch(e){ state.reader.loading=false; state.reader.error=true; }
    render();
  }
}

/* ---------------- Leitura em voz (síntese do aparelho) ---------------- */
function pickVoice(){
  if (!TTS) return null;
  const voices = TTS.getVoices() || [];
  if (!voices.length) return null;
  // prioriza vozes em português do Brasil
  return voices.find(v=>/pt[-_]br/i.test(v.lang)) ||
         voices.find(v=>/^pt/i.test(v.lang)) || null;
}
if (TTS){ try { TTS.onvoiceschanged = ()=>{ ttsVoice = pickVoice(); }; } catch(e){} }

function currentVerses(){
  const m = CHAPTER_META[state.reader.g];
  return (BIBLE && BIBLE[m.bi] && BIBLE[m.bi][m.ci]) ? BIBLE[m.bi][m.ci] : null;
}
function highlightVerse(k){
  const nodes = document.querySelectorAll(".rd-v.speaking");
  nodes.forEach(n=>n.classList.remove("speaking"));
  if (k==null) return;
  const el = document.getElementById("rdv-"+k);
  if (el){ el.classList.add("speaking"); try { el.scrollIntoView({block:"center",behavior:"smooth"}); } catch(e){ el.scrollIntoView(); } }
}
function updateSpeakBtn(){
  const btn = document.querySelector(".rd-speak");
  if (!btn) return;
  const sp = state.speak;
  const lbl = sp.active ? "Pausar" : (sp.paused ? "Continuar" : "Ouvir");
  const icn = sp.active ? "pause" : "play";
  btn.classList.toggle("on", sp.active);
  btn.setAttribute("aria-label", lbl);
  btn.innerHTML = ic(icn,17)+'<span class="lbl">'+lbl+'</span>';
}
function speakFrom(k){
  if (!TTS) return;
  const verses = currentVerses();
  if (!verses){ return; }
  if (k >= verses.length){ // terminou o capítulo: para e espera
    finishSpeak(); return;
  }
  state.speak.active = true; state.speak.paused = false; state.speak.idx = k;
  updateSpeakBtn(); highlightVerse(k);
  const gen = ttsGen;
  const u = new SpeechSynthesisUtterance(verses[k]);
  u.lang = "pt-BR";
  if (!ttsVoice) ttsVoice = pickVoice();
  if (ttsVoice) u.voice = ttsVoice;
  u.rate = 0.96; u.pitch = 1;
  u.onend = ()=>{ if (gen!==ttsGen || !state.speak.active) return; speakFrom(k+1); };
  u.onerror = ()=>{ if (gen!==ttsGen) return; /* ignora e segue esperando ação do usuário */ };
  try { TTS.speak(u); } catch(e){}
}
function toggleSpeak(){
  if (!TTS) return;
  const sp = state.speak;
  if (sp.active){            // está lendo -> pausa
    ttsGen++; try { TTS.cancel(); } catch(e){}
    sp.active = false; sp.paused = true;
    updateSpeakBtn();
  } else {                   // parado ou pausado -> (re)começa
    ttsGen++;
    speakFrom(sp.paused ? sp.idx : 0);
  }
}
function stopSpeak(){        // encerra de vez e limpa
  ttsGen++;
  if (TTS){ try { TTS.cancel(); } catch(e){} }
  state.speak = { active:false, paused:false, idx:0 };
  highlightVerse(null);
}
function finishSpeak(){      // fim do capítulo
  ttsGen++;
  state.speak = { active:false, paused:false, idx:0 };
  highlightVerse(null); updateSpeakBtn();
}

/* ---------------- PWA ---------------- */
window.addEventListener("beforeinstallprompt", (e)=>{ e.preventDefault(); deferredPrompt=e; render(); });
window.addEventListener("appinstalled", ()=>{ deferredPrompt=null; render(); });
if ("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}

/* ---------------- Início ---------------- */
load();
render();
setTimeout(()=>{ ensureBible().catch(()=>{}); }, 1500);
</script>
